services:
  mongodb:
    image: mongo:7
    container_name: gym_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gym_api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/?authSource=admin&directConnection=true
      DB_NAME: gym_management
      PORT: 8080
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      JWT_ACCESS_SECRET: local-docker-access-secret-change-me
      JWT_REFRESH_SECRET: local-docker-refresh-secret-change-me
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL: 168h
      BOOTSTRAP_ADMIN_EMPLOYEE_ID: ADMIN001
      BOOTSTRAP_ADMIN_FULL_NAME: Gym Admin
      BOOTSTRAP_ADMIN_EMAIL: admin@gym.test
      BOOTSTRAP_ADMIN_PASSWORD: demo123456

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: gym_frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "5173:80"

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    profiles:
      - seed
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/?authSource=admin&directConnection=true
      DB_NAME: gym_management
    command: ["/app/seed"]

volumes:
  mongo_data:
